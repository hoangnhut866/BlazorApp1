<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BlazorApp1</title>
    <base href="/" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="BlazorApp1.Client.styles.css" />
</head>
<body>
    <div id="app">
        <div class="d-flex justify-content-center align-items-center vh-100">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading…</span>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui" class="alert alert-danger m-3" style="display:none">
        An unhandled error has occurred.
        <a href="." class="alert-link">Reload</a>
        <span class="dismiss" onclick="document.getElementById('blazor-error-ui').style.display='none'">&#x2715;</span>
    </div>

    <script src="_framework/blazor.webassembly.js"></script>
</body>
</html>
